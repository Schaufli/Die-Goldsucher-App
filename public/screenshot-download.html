<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Download Screenshot</title>
<meta name="viewport" content="width=390, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; font-family: system-ui, sans-serif; }
#controls { padding: 12px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
#controls a, #controls button {
  padding: 10px 20px; background: #4a7c6f; color: white; border: none;
  border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer;
  text-decoration: none; display: inline-block;
}
#controls button { background: #d4a843; }
iframe { border: none; display: block; }
</style>
</head>
<body>
<div id="controls">
  <a id="openLink" href="#" target="_blank">Im neuen Tab öffnen</a>
  <span style="color:#aaa;font-size:12px;align-self:center;">dann Browser-Screenshot machen</span>
</div>
<iframe id="frame" width="390" height="844" scrolling="no"></iframe>
<script>
const params = new URLSearchParams(window.location.search);
const scene = params.get('scene') || '6';
const src = '/screenshot-helper.html?scene=' + scene + '&export=1';
document.getElementById('frame').src = src;
document.getElementById('openLink').href = src;
</script>
</body>
</html>
