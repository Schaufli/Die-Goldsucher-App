<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Die Goldsucher App</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                bg: '#F8F5F1',
                bgAlt: '#EDEDE7',
                bgSection: '#D9D9D6',
                text: '#2B2B2B',
                textSec: '#555555',
                gold: '#C9A646',
                accent: '#2F4F4F',
                accentLight: '#3A5A40',
              }
            },
            keyframes: {
              'fade-in': {
                '0%': { opacity: '0', transform: 'translateY(8px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              'slide-up': {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
            },
            animation: {
              'fade-in': 'fade-in 0.2s ease-out forwards',
              'slide-up': 'slide-up 0.25s ease-out forwards',
            },
          }
        }
      }
    </script>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <style>
      body {
        background-color: #F8F5F1;
        color: #2B2B2B;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        overscroll-behavior: none;
      }
      /* Hide scrollbar for clean mobile look */
      ::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }
      .leaflet-container {
        width: 100%;
        height: 100%;
        z-index: 10;
      }
      
      /* --- Custom Popup Styling for Dark Theme --- */
      .leaflet-popup-content-wrapper, .leaflet-popup-tip {
        background-color: #2F4F4F !important; /* Brand Accent */
        color: #F8F5F1 !important; /* Brand BG */
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06) !important;
      }
      .leaflet-popup-content {
        margin: 10px !important;
      }
      .leaflet-container a.leaflet-popup-close-button {
        color: #C9A646 !important; /* Brand Gold */
      }
      
      /* --- Custom Marker Icon (SVG) --- */
      .custom-div-icon {
        background: transparent !important;
        border: none !important;
      }
      .leaflet-control-attribution {
        display: none !important;
      }
      @keyframes pulse-slow {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
      .animate-pulse-slow {
        animation: pulse-slow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.574.0",
    "react-leaflet": "https://esm.sh/react-leaflet@^5.0.0",
    "leaflet": "https://esm.sh/leaflet@^1.9.4"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
